apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-dev
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: "#argocd-notifications"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: "#argocd-notifications"
    notifications.argoproj.io/subscribe.on-out-of-sync.slack: "#argocd-notifications"
spec:
  project: default
  source:
    repoURL: https://github.com/Omgmmui/gitops-repo.git
    targetRevision: main
    path: overlays/dev
    kustomize:
      images:
      - nginx=nginx:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas